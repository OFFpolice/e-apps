<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EPORNER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: var(--tg-viewport-height, 100vh);
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative; /* для позиционирования кнопки наверх */
        }

        .header {
            padding: calc(var(--tg-safe-area-inset-top) + 13px) 16px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            color: #fff;
        }

        .search-container {
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
        }

        #searchInput {
            width: 100%;
            padding: 14px 40px 14px 16px;
            border: none;
            border-radius: 14px;
            background: #1a1a1a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        #searchInput::placeholder {
            color: #888;
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #444;
            color: #fff;
            font-size: 18px;
            line-height: 24px;
            text-align: center;
            cursor: pointer;
            display: none;
            user-select: none;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #666;
        }

        .clear-btn:active {
            background: #888;
        }

        #searchBtn {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: #e50914;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        #searchBtn:active {
            opacity: 0.7;
        }

        #searchBtn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px calc(var(--tg-safe-area-inset-bottom, 0px) + 20px);
            scroll-behavior: smooth;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .video-card {
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .video-card:active {
            transform: scale(0.98);
        }

        .video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #222;
            display: block;
        }

        .video-info {
            padding: 12px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .video-title {
            font-size: 14px;
            line-height: 1.4;
            font-weight: 500;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-link {
            display: inline-block;
            padding: 8px 12px;
            background: #e50914;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-top: auto;
            border: none;
            cursor: pointer;
        }

        .status-message {
            text-align: center;
            padding: 24px 16px;
            color: #aaa;
            font-size: 15px;
        }

        .error-message {
            color: #ff4d4d;
        }

        .hidden {
            display: none !important;
        }

        .loader {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }

        .loader::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 8px;
            border: 2px solid #aaa;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Кнопка "Наверх" */
        .scroll-top-btn {
            position: fixed;
            bottom: calc(20px + var(--tg-safe-area-inset-bottom, 0px));
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: #e50914;
            color: #fff;
            border: none;
            font-size: 24px;
            line-height: 50px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: opacity 0.3s, transform 0.2s;
            z-index: 1000;
            display: none; /* скрыта по умолчанию */
            opacity: 0.9;
        }

        .scroll-top-btn:active {
            transform: scale(0.95);
            opacity: 1;
        }

        /* Для позиционирования внутри .app, чтобы кнопка была относительно контейнера */
        .app {
            position: relative;
        }

        .scroll-top-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="app">
        <header class="header">
            <h1>EPORNER</h1>
            <div class="search-container">
                <div class="input-wrapper">
                    <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off">
                    <span class="clear-btn" id="clearBtn">✕</span>
                </div>
                <button id="searchBtn">Search</button>
            </div>
        </header>

        <main class="content" id="content">
            <div id="videosGrid" class="videos-grid"></div>
            <div id="initialMessage" class="status-message hidden">Enter a query to start searching</div>
            <div id="loadingIndicator" class="loader hidden">Loading</div>
            <div id="noResultsMessage" class="status-message hidden">No videos found</div>
            <div id="errorMessage" class="status-message error-message hidden">Something went wrong. Try again.</div>
            <div id="endMessage" class="status-message hidden">You've reached the end</div>
        </main>

        <!-- Кнопка "Наверх" -->
        <button id="scrollTopBtn" class="scroll-top-btn hidden" aria-label="Наверх">↑</button>
    </div>

    <script>
        (function() {
            const tg = window.Telegram?.WebApp;
            if (!tg || !tg.initData) {
                console.warn('Not running in Telegram Web App');
            } else {
                tg.ready();
                tg.expand();
                if (tg.isVersionAtLeast('8.0')) {
                    tg.requestFullscreen();
                }
                tg.lockOrientation();
                tg.disableVerticalSwipes();
                tg.enableClosingConfirmation();
            }

            const EPORNER_API = 'https://www.eporner.com/api/v2/video/search/';
            const PER_PAGE = 10;

            let currentQuery = '';
            let currentPage = 1;
            let totalPages = 0;
            let isLoading = false;
            let reachedEnd = false;

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const clearBtn = document.getElementById('clearBtn');
            const contentEl = document.getElementById('content');
            const videosGrid = document.getElementById('videosGrid');
            const initialMessage = document.getElementById('initialMessage');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const noResultsMessage = document.getElementById('noResultsMessage');
            const errorMessage = document.getElementById('errorMessage');
            const endMessage = document.getElementById('endMessage');
            const scrollTopBtn = document.getElementById('scrollTopBtn');

            // Показывать/скрывать кнопку "Наверх" в зависимости от прокрутки
            function toggleScrollTopButton() {
                if (contentEl.scrollTop > 300) {
                    scrollTopBtn.classList.remove('hidden');
                } else {
                    scrollTopBtn.classList.add('hidden');
                }
            }

            // Прокрутка наверх
            function scrollToTop() {
                contentEl.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // Обновление видимости кнопки очистки
            function toggleClearButton() {
                if (searchInput.value.trim().length > 0) {
                    clearBtn.style.display = 'block';
                } else {
                    clearBtn.style.display = 'none';
                }
            }

            // Очистка поля и сброс состояния
            function clearSearch() {
                searchInput.value = '';
                currentQuery = '';
                currentPage = 1;
                reachedEnd = false;
                videosGrid.innerHTML = '';
                // Скрываем все сообщения, кроме initialMessage? Но initialMessage должно появляться только при пустом поиске, поэтому скрываем всё
                hideAllStatusMessages();
                toggleClearButton();
            }

            function hideAllStatusMessages() {
                initialMessage.classList.add('hidden');
                noResultsMessage.classList.add('hidden');
                errorMessage.classList.add('hidden');
                endMessage.classList.add('hidden');
            }

            function showLoading(show) {
                if (show) {
                    loadingIndicator.classList.remove('hidden');
                } else {
                    loadingIndicator.classList.add('hidden');
                }
            }

            function buildApiUrl(query, page) {
                const params = new URLSearchParams({
                    query: query,
                    per_page: String(PER_PAGE),
                    page: String(page),
                    thumbsize: 'big',
                    order: 'top-weekly',
                    gay: '1',
                    lq: '1',
                    format: 'json'
                });
                return `${EPORNER_API}?${params.toString()}`;
            }

            function createVideoCard(video) {
                const thumbSrc = video.thumbs?.[0]?.src || 'https://via.placeholder.com/320x180?text=No+Image';
                const title = (video.title || 'Untitled')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');

                const videoUrl = video.embed || video.url || '#';

                const card = document.createElement('div');
                card.className = 'video-card';

                card.innerHTML = `
                    <img class="video-thumb" src="${thumbSrc}" alt="" loading="lazy">
                    <div class="video-info">
                        <div class="video-title">${title}</div>
                        <a href="${videoUrl}" target="_blank" rel="noopener noreferrer" class="video-link">Play</a>
                    </div>
                `;
                return card;
            }

            function renderVideos(videos) {
                for (const video of videos) {
                    const card = createVideoCard(video);
                    videosGrid.appendChild(card);
                }
            }

            async function loadVideos(isNewSearch = false) {
                if (isLoading) return;
                if (!currentQuery.trim()) {
                    // Если запрос пустой, ничего не загружаем, но и сообщение не показываем (оно появится при попытке поиска)
                    return;
                }
                if (reachedEnd && !isNewSearch) return;

                if (isNewSearch) {
                    currentPage = 1;
                    reachedEnd = false;
                    videosGrid.innerHTML = '';
                    hideAllStatusMessages(); // скрываем все сообщения перед загрузкой
                    showLoading(true);
                } else {
                    showLoading(true);
                }

                isLoading = true;
                searchBtn.disabled = true;

                try {
                    const url = buildApiUrl(currentQuery, currentPage);
                    const response = await fetch(url);

                    if (!response.ok) {
                        throw new Error(`HTTP error ${response.status}`);
                    }

                    const data = await response.json();
                    totalPages = data.total_pages ?? 0;
                    const videos = data.videos || [];

                    if (isNewSearch && videos.length === 0) {
                        hideAllStatusMessages();
                        noResultsMessage.classList.remove('hidden');
                        reachedEnd = true;
                        showLoading(false);
                        isLoading = false;
                        searchBtn.disabled = false;
                        return;
                    }

                    renderVideos(videos);

                    currentPage++;

                    if (currentPage > totalPages) {
                        reachedEnd = true;
                        hideAllStatusMessages();
                        if (videos.length > 0) {
                            endMessage.classList.remove('hidden');
                        }
                    }

                    // Если успешно загружены видео, скрываем все сообщения
                    if (isNewSearch && videos.length > 0) {
                        hideAllStatusMessages();
                    }

                } catch (error) {
                    console.error('API error:', error);
                    hideAllStatusMessages();
                    errorMessage.classList.remove('hidden');
                    reachedEnd = false;
                } finally {
                    isLoading = false;
                    searchBtn.disabled = false;
                    showLoading(false);
                }
            }

            function onContentScroll() {
                toggleScrollTopButton(); // проверяем, показывать ли кнопку "Наверх"

                if (isLoading || reachedEnd || !currentQuery.trim()) return;

                const { scrollTop, scrollHeight, clientHeight } = contentEl;
                if (scrollTop + clientHeight >= scrollHeight - 300) {
                    loadVideos(false);
                }
            }

            function performSearch() {
                const query = searchInput.value.trim();

                // Скрываем все сообщения сначала
                hideAllStatusMessages();

                if (!query) {
                    // Если поле пустое, показываем initialMessage и сбрасываем результаты
                    initialMessage.classList.remove('hidden');
                    videosGrid.innerHTML = '';
                    currentQuery = '';
                    currentPage = 1;
                    reachedEnd = false;
                    return;
                }

                // Если запрос не пустой, запускаем поиск
                currentQuery = query;
                loadVideos(true);
            }

            // События
            searchInput.addEventListener('input', () => {
                toggleClearButton();
                // Если поле стало пустым в процессе ввода, мы не сбрасываем результаты автоматически,
                // чтобы пользователь мог продолжить ввод. Сброс произойдёт только при явном поиске с пустым полем.
                // Однако можно предусмотреть, что если пользователь стёр всё и нажимает поиск, тогда покажется сообщение.
            });

            clearBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                clearSearch();
                // После очистки поля результаты пропадают, но initialMessage не показываем до попытки поиска
                hideAllStatusMessages();
            });

            searchBtn.addEventListener('click', performSearch);

            contentEl.addEventListener('scroll', onContentScroll);

            // Кнопка "Наверх"
            scrollTopBtn.addEventListener('click', scrollToTop);

            // Инициализация: скрываем все сообщения, кнопка очистки скрыта, кнопка наверх скрыта
            hideAllStatusMessages();
            toggleClearButton();
            toggleScrollTopButton(); // при старте прокрутка 0, значит скрыта

            function setViewportHeight() {
                if (tg) {
                    document.documentElement.style.setProperty('--tg-viewport-height', tg.viewportStableHeight + 'px');
                }
            }
            setViewportHeight();
            if (tg) {
                tg.onEvent('viewportChanged', setViewportHeight);
            }
        })();
    </script>
</body>
</html>
