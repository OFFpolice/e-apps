<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Video Search</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--tg-theme-bg-color, #000);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: var(--tg-viewport-height, 100vh);
            display: flex;
            flex-direction: column;
            background: var(--tg-theme-bg-color, #000);
        }
        .header {
            padding: calc(var(--tg-safe-area-inset-top, 0px) + 16px) 16px 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color, rgba(255,255,255,0.1));
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #fff);
        }
        .search-container {
            display: flex;
            gap: 10px;
        }
        #searchInput {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #fff);
            font-size: 16px;
            outline: none;
        }
        #searchInput::placeholder {
            color: var(--tg-theme-hint-color, #888);
        }
        #searchBtn {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: var(--tg-theme-button-color, #e50914);
            color: var(--tg-theme-button-text-color, #fff);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        #searchBtn:active {
            opacity: 0.7;
        }
        #searchBtn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px calc(var(--tg-safe-area-inset-bottom, 0px) + 20px);
            scroll-behavior: smooth;
        }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }
        .video-card {
            background: var(--tg-theme-secondary-bg-color, #111);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            border: 1px solid var(--tg-theme-hint-color, rgba(255,255,255,0.05));
        }
        .video-card:active {
            transform: scale(0.98);
        }
        .video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #222;
            display: block;
        }
        .video-info {
            padding: 12px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .video-title {
            font-size: 14px;
            line-height: 1.4;
            font-weight: 500;
            color: var(--tg-theme-text-color, #fff);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-link {
            display: inline-block;
            padding: 8px 12px;
            background: var(--tg-theme-button-color, #e50914);
            color: var(--tg-theme-button-text-color, #fff);
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-top: auto;
            border: none;
            cursor: pointer;
        }
        .status-message {
            text-align: center;
            padding: 24px 16px;
            color: var(--tg-theme-hint-color, #aaa);
            font-size: 15px;
        }
        .error-message {
            color: #ff4d4d;
        }
        .hidden {
            display: none !important;
        }
        .loader {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color, #aaa);
        }
        .loader::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 8px;
            border: 2px solid var(--tg-theme-hint-color, #aaa);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app" class="app">
        <header class="header">
            <h1>Video Search</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off">
                <button id="searchBtn">Search</button>
            </div>
        </header>

        <main class="content" id="content">
            <div id="videosGrid" class="videos-grid"></div>
            <div id="initialMessage" class="status-message">Enter a query to start searching</div>
            <div id="loadingIndicator" class="loader hidden">Loading</div>
            <div id="noResultsMessage" class="status-message hidden">No videos found</div>
            <div id="errorMessage" class="status-message error-message hidden">Something went wrong. Try again.</div>
            <div id="endMessage" class="status-message hidden">You've reached the end</div>
        </main>
    </div>

    <script>
        (function() {
            const tg = window.Telegram?.WebApp;
            if (!tg || !tg.initData) {
                console.warn('Not running in Telegram Web App');
            } else {
                tg.ready();
                tg.expand();
                if (tg.isVersionAtLeast('8.0')) {
                    tg.requestFullscreen();
                }
                tg.disableVerticalSwipes();
                document.body.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#000');
                document.body.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#fff');
                document.body.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#aaa');
                document.body.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#e50914');
                document.body.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#fff');
                document.body.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#111');
            }

            const EPORNER_API = 'https://www.eporner.com/api/v2/video/search/';
            const PER_PAGE = 10;

            let currentQuery = '';
            let currentPage = 1;
            let totalPages = 0;
            let isLoading = false;
            let reachedEnd = false;

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const contentEl = document.getElementById('content');
            const videosGrid = document.getElementById('videosGrid');
            const initialMessage = document.getElementById('initialMessage');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const noResultsMessage = document.getElementById('noResultsMessage');
            const errorMessage = document.getElementById('errorMessage');
            const endMessage = document.getElementById('endMessage');

            function hideAllStatusMessages() {
                initialMessage.classList.add('hidden');
                noResultsMessage.classList.add('hidden');
                errorMessage.classList.add('hidden');
                endMessage.classList.add('hidden');
            }
            function showLoading(show) {
                if (show) {
                    loadingIndicator.classList.remove('hidden');
                } else {
                    loadingIndicator.classList.add('hidden');
                }
            }

            function buildApiUrl(query, page) {
                const params = new URLSearchParams({
                    query: query,
                    per_page: String(PER_PAGE),
                    page: String(page),
                    thumbsize: 'big',
                    order: 'top-weekly',
                    gay: '1',
                    lq: '1',
                    format: 'json'
                });
                return `${EPORNER_API}?${params.toString()}`;
            }

            function createVideoCard(video) {
                const thumbSrc = video.thumbs?.[0]?.src || 'https://via.placeholder.com/320x180?text=No+Image';
                const title = (video.title || 'Untitled')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
                
                const videoUrl = video.embed || video.url || '#';

                const card = document.createElement('div');
                card.className = 'video-card';

                card.innerHTML = `
                    <img class="video-thumb" src="${thumbSrc}" alt="" loading="lazy">
                    <div class="video-info">
                        <div class="video-title">${title}</div>
                        <a href="${videoUrl}" target="_blank" rel="noopener noreferrer" class="video-link">Play</a>
                    </div>
                `;
                return card;
            }

            function renderVideos(videos) {
                for (const video of videos) {
                    const card = createVideoCard(video);
                    videosGrid.appendChild(card);
                }
            }

            async function loadVideos(isNewSearch = false) {
                // Проверки состояния
                if (isLoading) return;
                if (!currentQuery.trim()) {
                    hideAllStatusMessages();
                    initialMessage.classList.remove('hidden');
                    return;
                }
                if (reachedEnd && !isNewSearch) return;

                if (isNewSearch) {
                    currentPage = 1;
                    reachedEnd = false;
                    videosGrid.innerHTML = '';
                    hideAllStatusMessages();
                    showLoading(true);
                } else {
                    showLoading(true);
                }

                isLoading = true;
                searchBtn.disabled = true;

                try {
                    const url = buildApiUrl(currentQuery, currentPage);
                    const response = await fetch(url);

                    if (!response.ok) {
                        throw new Error(`HTTP error ${response.status}`);
                    }

                    const data = await response.json();
                    totalPages = data.total_pages ?? 0;
                    const videos = data.videos || [];

                    if (isNewSearch && videos.length === 0) {
                        hideAllStatusMessages();
                        noResultsMessage.classList.remove('hidden');
                        reachedEnd = true; // Больше нечего грузить
                        showLoading(false);
                        isLoading = false;
                        searchBtn.disabled = false;
                        return;
                    }

                    renderVideos(videos);

                    currentPage++;

                    if (currentPage > totalPages) {
                        reachedEnd = true;
                        hideAllStatusMessages();
                        if (videos.length > 0) {
                            endMessage.classList.remove('hidden');
                        }
                    }

                    if (isNewSearch && videos.length > 0) {
                        hideAllStatusMessages();
                    }

                } catch (error) {
                    console.error('API error:', error);
                    hideAllStatusMessages();
                    errorMessage.classList.remove('hidden');
                    reachedEnd = false;
                } finally {
                    isLoading = false;
                    searchBtn.disabled = false;
                    showLoading(false);
                }
            }

            function onContentScroll() {
                if (isLoading || reachedEnd || !currentQuery.trim()) return;

                const { scrollTop, scrollHeight, clientHeight } = contentEl;
                if (scrollTop + clientHeight >= scrollHeight - 300) {
                    loadVideos(false);
                }
            }

            function performSearch() {
                const query = searchInput.value.trim();
                if (!query) {
                    hideAllStatusMessages();
                    initialMessage.classList.remove('hidden');
                    videosGrid.innerHTML = '';
                    currentQuery = '';
                    reachedEnd = false;
                    return;
                }

                currentQuery = query;
                // Загружаем первую страницу
                loadVideos(true);
            }

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });

            searchInput.addEventListener('input', () => {
                if (!searchInput.value.trim()) {
                    hideAllStatusMessages();
                    initialMessage.classList.remove('hidden');
                } else {
                }
            });
            contentEl.addEventListener('scroll', onContentScroll);

            if (tg) {
                tg.onEvent('themeChanged', () => {
                    document.body.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#000');
                    document.body.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#fff');
                    document.body.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#aaa');
                    document.body.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#e50914');
                    document.body.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#fff');
                    document.body.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#111');
                });

                document.body.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#000');
                document.body.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#fff');
                document.body.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#aaa');
                document.body.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#e50914');
                document.body.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#fff');
                document.body.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#111');
            }

            hideAllStatusMessages();
            initialMessage.classList.remove('hidden');

            function setViewportHeight() {
                if (tg) {
                    document.documentElement.style.setProperty('--tg-viewport-height', tg.viewportStableHeight + 'px');
                }
            }
            setViewportHeight();
            if (tg) {
                tg.onEvent('viewportChanged', setViewportHeight);
            }
        })();
    </script>
</body>
</html>
