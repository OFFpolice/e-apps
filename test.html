<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TikTokMediaSaveBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        .hidden {
            display: none !important;
        }
        .blocked {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .blocked-card {
            max-width: 420px;
            text-align: center;
        }
        .blocked-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .blocked-text {
            font-size: 15px;
            line-height: 1.55;
            color: #d0d0d0;
            margin-bottom: 24px;
        }
        .blocked-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 22px;
            border-radius: 14px;
            background: #e50914;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        .app {
            width: 100%;
            max-width: 480px;
            height: var(--tg-viewport-height, 100dvh);
            display: none;
            flex-direction: column;
            margin: 0 auto;
        }
        .top-bar {
            padding: calc(var(--tg-safe-area-inset-top) + 13px) 16px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            outline: none;
            background: #1a1a1a;
            color: #fff;
            font-size: 15px;
        }
        .search-box button {
            padding: 14px 18px;
            border-radius: 14px;
            border: none;
            background: #e50914;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 18px 18px calc(var(--tg-content-safe-area-inset-bottom) + 24px);
        }
        .status {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
        }
        video {
            width: 100%;
            border-radius: 16px;
            background: #000;
            margin-top: 12px;
        }
        .download-main {
            width: 100%;
            padding: 14px;
            margin-top: 14px;
            border: none;
            border-radius: 14px;
            background: #e50914;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        .images {
            margin-top: 14px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .image-card {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background: #111;
        }
        .image-card img {
            width: 100%;
            display: block;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
        }
        .img-download {
            position: absolute;
            left: 6px;
            right: 6px;
            bottom: 6px;
            padding: 8px 0;
            border: none;
            border-radius: 10px;
            background: rgba(229, 9, 20, 0.95);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .description {
            margin-top: 14px;
            font-size: 14px;
            line-height: 1.45;
            color: #ddd;
            padding: 18px;
        }
    </style>

</head>
<body>

<div id="blocked" class="blocked">
    <div class="blocked-card">
        <div class="blocked-title">TikTok Media Save</div>
        <div class="blocked-text">
            Telegram Mini App for downloading videos and photos from TikTok without watermarks.<br><br>
            The app works <strong>only within Telegram</strong>.
        </div>
        <a class="blocked-link" href="https://t.me/TikTokMediaSaveBot/app">Open App in Telegram</a>
    </div>
</div>

<div id="app" class="app">
    <div class="top-bar">
        <div class="title">TikTok-App</div>
        <div class="search-box">
            <input id="tiktokUrl" type="text" placeholder="Enter URL...">
            <button id="loadBtn" type="button">Load</button>
        </div>
    </div>

    <div class="content">
        <div id="status" class="status"></div>
        <div id="images" class="images"></div>
        <video id="video" controls playsinline class="hidden"></video>
        <button id="downloadVideo" type="button" class="download-main hidden">Download</button>
        <div id="description" class="description"></div>
    </div>
</div>

<script>
    if (!window.Telegram || !Telegram.WebApp || !Telegram.WebApp.initData) {
        document.getElementById("blocked").style.display = "flex";
        throw new Error("Not in Telegram Web App");
    }

    const tg = Telegram.WebApp;

    tg.ready();
    tg.expand();

    if (tg.isVersionAtLeast("8.0")) {
        tg.requestFullscreen();
    }

    tg.enableClosingConfirmation();
    tg.disableVerticalSwipes();
    tg.lockOrientation();

    function syncViewport() {
        document.documentElement.style.setProperty(
            "--tg-viewport-height",
            tg.viewportStableHeight + "px"
        );
    }

    syncViewport();

    tg.onEvent("viewportChanged", function (e) {
        if (e.isStateStable) {
            syncViewport();
        }
    });

    document.getElementById("app").style.display = "flex";

    function resetUI() {
        videoEl.classList.add("hidden");
        downloadVideoBtn.classList.add("hidden");
        videoEl.src = "";
        imagesEl.innerHTML = "";
        descEl.textContent = "";
    }

    function setStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.style.color = isError ? "#ff4d4d" : "#aaa";
    }
</script>

</body>
</html>
